<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl" crossorigin="anonymous">
    
    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>


    <title>UCC</title>
  </head>
  <body>

    <div class="container mt-4">


      <main class="container p-3 my-3 border" style="background-image: url('a.jpg');">

        <form action="/register " class="form-horizontal" method="post">


          <div class="form-group mt-4">
              <label for="username" class="text-light bg-dark mb-2">Username:</label>
              <input class="form-control" name="username" placeholder="Enter username..." type="username">
          </div>
  
          <div class="form-group mt-4 mb-4">
            <label for="email" class="text-light bg-dark mb-2">Email:</label>
              <input class="form-control" name="email" placeholder="Enter e-mail..." type="email">
          </div>

          <div class="form-group mt-4 mb-3">
              <label for="password" class="text-light bg-dark mb-2">Password:</label>
              <input class="form-control" name="password" placeholder="Enter password..." type="password">
          </div>

          <div class="form-group mt-4 mb-3">
            <label for="confirmpassword" class="text-light bg-dark mb-2">Confirm password:</label>

            <input class="form-control" name="confirmpassword" placeholder="Enter password again..." type="password">


          </div>
  
        </form>
  
      </main>
  
      <div class="text-center mb-4 mt-4">
        <button class="btn btn-outline-dark"  type="submit">Register</button>
      
      </div>
  
      <div class="text-center mt-2">
        <h6>If you don't have an account click <a href="signup.html">here</a></h6>
      </div>


    </div>

  </body>
</html>
